# yaml-language-server: $schema=https://download.pactflow.io/drift/schemas/drift.testcases.v1.schema.json
drift-testcase-file: v1
title: "Shipping Server Tests"

sources:
  - name: source-oad
    path: ./openapi.yaml

plugins:
  - name: oas
  - name: json

operations:
  # requires mock for quote service
  getQuote_Success:
    target: source-oad:getQuote
    tags:
      - pending
    parameters:
      request:
        body:
          items:
            - productId: "OLJCESPC7Z"
              quantity: 2
    expected:
      response:
        statusCode: 200

  shipOrder_Success:
    target: source-oad:shipOrder
    tags:
      - test
    parameters:
      request:
        body:
          items:
            - productId: "OLJCESPC7Z"
              quantity: 2

  shipOrder_withAddress_Success:
    target: source-oad:shipOrder
    tags:
      - test
    parameters:
      request:
        body:
          items:
            - productId: "OLJCESPC7Z"
              quantity: 2
          address:
            streetAddress: "123 Main St"
            city: "New York"
            state: "NY"
            country: "USA"
            zipCode: "10001"
  shipOrder_multipleItems_Success:
    target: source-oad:shipOrder
    tags:
      - test
    parameters:
      request:
        body:
          items:
            - productId: "OLJCESPC7Z"
              quantity: 2
            - productId: "9SIQT8TNJE"
              quantity: 3

  shipOrder_invalidField_Failure:
    target: source-oad:shipOrder
    tags:
      - pending
    parameters:
      request:
        ignore:
          schema: true
        headers:
          Content-Type: "application/json"
        body:
          items:
            - productId: "OLJCESPC7Z"
    expected:
      response:
        statusCode: 400

